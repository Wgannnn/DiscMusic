<!-- Mini-dysk -->
<div class="mini-disk" (click)="toggleMenu()">DM</div>

<!-- Menu główne -->
<div class="menu" [class.active]="menuOpen">
  <ul>
    <li><a routerLink="/" (click)="menuOpen = false">Home</a></li>
    <li *ngIf="!authService.loggedIn()">
      <a routerLink="/login" (click)="menuOpen = false">Login</a>
    </li>
    <li *ngIf="authService.loggedIn()">
      <a routerLink="/settings" (click)="menuOpen = false">Settings</a>
    </li>
    <li><a routerLink="/playlists" (click)="menuOpen = false">Playlists</a></li>
  </ul>
</div>

<!-- Kółko profilowe tylko jeśli zalogowany -->
<div *ngIf="authService.loggedIn()" class="profile-circle" (click)="toggleProfileMenu()">
  <span>U</span>
</div>

<div *ngIf="authService.loggedIn()" class="profile-menu" [class.active]="profileMenuOpen">
  <ul>
    <li><a routerLink="/profile" (click)="profileMenuOpen = false">Profile</a></li>
    <li><a (click)="logout()">Logout</a></li>
  </ul>
</div>

<router-outlet></router-outlet>
